setup:
  addons:
    - plan: heroku-postgresql:essential-0
      as: DATABASE

build:
  docker:
    web: Dockerfile
    admin_worker: management/Dockerfile
    customer_worker: customer/Dockerfile

run:
  web: infisical run --projectId 0eaba646-92c7-4cf1-8102-aabb7f2e9c07 --env=prod -- node big-jumps-4-tods/myapp/app.js
  admin_worker: node big-jumps-4-tods
  customer_worker: node big-jumps-4-tods/admin/bigjumps4tods/src/app
